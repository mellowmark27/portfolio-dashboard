<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Portfolio Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .header-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            margin: 10px 0;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-box {
            padding: 10px 15px;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 0.95em;
            flex: 1;
            min-width: 200px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95em;
        }

        th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f9f9f9;
        }

        .positive {
            color: #27ae60;
            font-weight: 600;
        }

        .negative {
            color: #e74c3c;
            font-weight: 600;
        }

        .symbol-cell {
            font-weight: 600;
            color: #667eea;
        }

        .last-updated {
            text-align: center;
            color: #666;
            font-size: 0.9em;
            margin-top: 20px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 8px;
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin-bottom: 20px;
        }

        @media (max-width: 1024px) {
            .controls {
                flex-direction: column;
            }
            .search-box {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Investment Portfolio Dashboard</h1>
            <p>Real-time portfolio tracking - Updated daily at 5:30 PM</p>
            
            <div class="header-info">
                <div class="stat-card">
                    <div class="stat-label">Total Holdings</div>
                    <div class="stat-value" id="totalHoldings">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Avg Daily Change</div>
                    <div class="stat-value" id="avgChange">0%</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Volume</div>
                    <div class="stat-value" id="totalVolume">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Last Updated</div>
                    <div class="stat-value" id="lastUpdatedTime">--</div>
                </div>
            </div>
        </header>

        <div class="card">
            <h2>📋 Portfolio Holdings</h2>
            
            <div class="controls">
                <input 
                    type="text" 
                    class="search-box" 
                    id="searchBox" 
                    placeholder="Search by symbol or company name..."
                >
                <button onclick="location.reload()">🔄 Refresh</button>
            </div>

            <div style="overflow-x: auto;">
                <table id="portfolioTable">
                    <thead>
                        <tr>
                            <th>Symbol</th>
                            <th>Company Name</th>
                            <th>Last Price</th>
                            <th>Daily Change %</th>
                            <th>Volume</th>
                            <th>Updated</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>

            <div class="last-updated" id="lastUpdated"></div>
        </div>
    </div>

    <script>
        // Load portfolio data from JSON
        async function loadPortfolio() {
            try {
                const response = await fetch('portfolio_data.json');
                const data = await response.json();
                displayPortfolio(data);
            } catch (error) {
                console.error('Error loading portfolio:', error);
                document.getElementById('tableBody').innerHTML = 
                    '<tr><td colspan="6" style="text-align:center; color:red;">Error loading data</td></tr>';
            }
        }

        function displayPortfolio(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            let totalChange = 0;
            let totalVolume = 0;

            data.forEach(stock => {
                const change = stock['Daily Change %'];
                const changeClass = change > 0 ? 'positive' : change < 0 ? 'negative' : '';
                
                totalChange += change;
                totalVolume += stock.Volume;

                const row = `
                    <tr>
                        <td class="symbol-cell">${stock.Symbol}</td>
                        <td>${stock.Name}</td>
                        <td>${stock['Last Price']} ${stock.Currency}</td>
                        <td class="${changeClass}">${change >= 0 ? '+' : ''}${change}%</td>
                        <td>${formatNumber(stock.Volume)}</td>
                        <td>${new Date(stock.Updated).toLocaleString()}</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });

            // Update stats
            document.getElementById('totalHoldings').textContent = data.length;
            document.getElementById('avgChange').textContent = 
                (totalChange / data.length).toFixed(2) + '%';
            document.getElementById('totalVolume').textContent = formatNumber(totalVolume);
            
            const lastUpdated = data[0]?.Updated ? 
                new Date(data[0].Updated).toLocaleString() : '--';
            document.getElementById('lastUpdatedTime').textContent = 
                lastUpdated.split(',')[1] || '--';
            document.getElementById('lastUpdated').textContent = 
                `Last updated: ${lastUpdated}`;

            // Enable search
            document.getElementById('searchBox').addEventListener('input', function(e) {
                const term = e.target.value.toLowerCase();
                const rows = document.querySelectorAll('#tableBody tr');
                rows.forEach(row => {
                    const text = row.textContent.toLowerCase();
                    row.style.display = text.includes(term) ? '' : 'none';
                });
            });
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        // Load on page load
        loadPortfolio();
    </script>
</body>
</html>
